<!doctype html>
<html lang="es" data-lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diet Pro Planner · v0.0.9</title>
  <link rel="icon" type="image/png" href="/static/app-icon.png" />
  <link rel="apple-touch-icon" href="/static/app-icon.png" />
  <link rel="stylesheet" href="/static/styles.css?v=0.0.7" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img class="brand-logo" src="/static/app-icon.png" alt="Diet Pro Planner"><div><h1>Diet Pro Planner</h1><p>Raspberry · local · privado</p></div></div>
      <nav id="nav" class="nav"></nav>
      <div class="side-rule"><span>Regla de hoy</span><b>Proteína + aceite medido</b><small>5 g normal · 10 g máximo. Pasta/arroz siempre en seco.</small></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div><div class="eyebrow">Dieta controlada · v0.0.9</div><h2 id="pageTitle">Resumen</h2></div>
        <div class="top-actions"><button id="btnRefresh" class="ghost">Actualizar</button><a class="ghost" href="/api/export" target="_blank">Exportar DB</a></div>
      </header>
      <div class="rule-banner" role="note" aria-label="Regla de hoy">
        <span>Regla de hoy</span>
        <strong>Proteína + aceite medido</strong>
        <small>5 g normal · 10 g máximo · pasta/arroz siempre en seco.</small>
      </div>
      <div class="global-cta" aria-label="Acciones principales">
        <button class="cta-food" onclick="go('register')"><span>🍽️</span><b>Registrar comida</b></button>
        <button class="cta-sport" onclick="go('sport')"><span>🏋️</span><b>Registrar entreno</b></button>
        <button class="cta-weight" onclick="go('weights')"><span>⚖️</span><b>Registrar peso</b></button>
        <button class="cta-template" onclick="go('templates')"><span>⚡</span><b>Plantillas</b></button>
      </div>
      <section id="view"></section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/static/app.js?v=0.0.7"></script>
</body>
</html>
